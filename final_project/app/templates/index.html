{% extends "layout.html" %}
{% block title %}Home{% endblock %}

{% block content %}
<div class="text-center">
  <h1 class="mt-5">Welcome to Your Personal Inventory</h1>

  {% if current_user.id %}

  {% endif %}
</div>
{% endblock %}
